{% extends "layouts/main.html" %}

{% block title %}Países{% endblock %}

{% block content %}
<h2>Lista de Países</h2>
<div class="row">
    <div class="col-12 mb-2">
        <button class="btn btn-success"
            onclick="api.window.openModal('pages/country', { width: 900, height: 600, title: 'Cadastrar País' })">
            <i class="fa-solid fa-plus"></i>
            Novo país
        </button>
    </div>
</div>
<div class="row">
    <div class="col-12">
        <table id="table-country" class="table table-striped table-hover table-bordered" style="width: 100%;">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Código</th>
                    <th>Nome</th>
                    <th>Localização</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script defer type="module" src="file:///{{ assets }}/js/list-country.js"></script>
{% endblock %}
