{% extends "layouts/main.html" %}

{% block title %}Novo Produto{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12">
        <h2>Cadastro de Produto</h2>
    </div>
</div>
<form id="form">
    <input type="hidden" id="id" name="id">
    <input type="hidden" id="action" name="action">
    <div class="row">
        <div class="col-6">
            <div class="form-floating mb-3">
                <input type="text" class="form-control" id="nome" name="nome" placeholder="example" autofocus>
                <label for="nome">Nome do Produto</label>
            </div>
        </div>
        <div class="col-6">
            <div class="form-floating mb-3">
                <input type="text" class="form-control" id="codigo_barra" name="codigo_barra" placeholder="example">
                <label for="codigo_barra">Código de Barra</label>
            </div>
        </div>
    </div>
    <div class="row">
        <div class="col-6">
            <div class="form-floating mb-3">
                <input type="text" class="form-control" id="unidade" name="unidade" placeholder="example">
                <label for="unidade">Unidade</label>
            </div>
        </div>
        <div class="col-6">
            <div class="form-floating mb-3">
                <input type="number" step="0.01" class="form-control" id="preco_compra" name="preco_compra" placeholder="example">
                <label for="preco_compra">Preço de Compra</label>
            </div>
        </div>
    </div>
    <div class="row">
        <div class="col-6">
            <div class="form-floating mb-3">
                <input type="number" step="0.01" class="form-control" id="preco_venda" name="preco_venda" placeholder="example">
                <label for="preco_venda">Preço de Venda</label>
            </div>
        </div>
        <div class="col-6">
            <div class="form-floating mb-3">
                <textarea class="form-control" placeholder="Leave a comment here" id="descricao" name="descricao" style="height: 100px"></textarea>
                <label for="descricao">Descrição</label>
            </div>
        </div>
                <div class="col-12">
            <div class="form-check">
                <input class="form-check-input" type="checkbox" name="ativo" id="ativo" value="true">
                <label class="form-check-label" for="ativo">
                    Ativo?
                </label>
            </div>
        </div>
    <div class="row">
        <div class="col-12">
            <button type="button" class="btn btn-outline-success" id="insert">
                <i class="fa-solid fa-floppy-disk"></i>
                Salvar
            </button>
        </div>
    </div>
</form>

{% endblock %}

{% block scripts %}
<script src="file:///{{ assets }}/js/product.js"></script>
{% endblock %}
